<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA — Feel your day.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <nav>
        <div class="logo">AURA</div>
        <div class="nav-controls">
            <a href="https://github.com/andrewavilan-work/AURA" target="_blank" class="github-btn" title="View Source on GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57A12.02 12.02 0 0024 12c0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
            <button id="lang-btn">EN | ES</button>
        </div>
    </nav>

    <main>
        <section id="input-section">
            <h1 class="hero-title" data-i18n="heroTitle">Feel your day. See your mood.</h1>
            <textarea id="journal-input" data-i18n-placeholder="placeholder" placeholder="Tell me about your day... what happened? how did you feel?"></textarea>
            <button id="analyze-btn" data-i18n="button">Analyze my day</button>
            <div id="error-message" class="hidden"></div>
        </section>

        <section id="loading-section" class="hidden">
            <div class="spinner"></div>
            <p data-i18n="loading">Reading your emotions...</p>
        </section>

        <section id="result-section" class="hidden">
            <div class="emotions-badges">
                <div class="badge dominant" id="dominant-badge">
                    <span class="emoji" id="dominant-emoji">✨</span>
                    <span class="label" data-i18n="dominant">Dominant emotion</span>: <span id="dominant-value"></span>
                </div>
                <div class="badge secondary" id="secondary-badge">
                    <span class="label" data-i18n="secondary">Secondary emotion</span>: <span id="secondary-value"></span>
                </div>
            </div>

            <div class="card summary-card">
                <h3 data-i18n="summary">Your day</h3>
                <p id="summary-text"></p>
            </div>

            <div class="card message-card">
                <h3 data-i18n="message">For you</h3>
                <p id="message-text"></p>
            </div>

            <div class="controls">
                <button id="music-btn" class="btn-secondary" data-i18n="musicOn">Pause music</button>
                <button id="reset-btn" class="btn-primary" data-i18n="reset">Write a new day</button>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
